front:
  text: 玉籙大齋第二日早朝儀午朝晚朝同卷率六各禮師存念如法五星靈暎煥景丹庭包羅無外合炁群靈濳形杳黙周遊五經揚威耀日役使甲丁郤災除禍滌穢消氛萬魔恐怖龍虎飛奔紫雲交覆萬炁齊并
  hash: sha256:6cc50beafb9afaa8d5c43ec1b047c1de40833db7bddbe26ece9d03e4b43c659b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0204_HFL_000-001a, image: hfl/0269/0269-070.png}
body:
  text: 鳴法鼓二十四通无上三天玄元始三炁太上老君召出臣身中三五功曹左右官使者左右捧香金童傳言散花玉女五帝直符直日香官各三十六人出出者嚴裝顯服冠帶垂纓關啓玄壇土地方域神眞臣今早朝陞壇行道朝謁帝真謹奏爲入意其諸誠意具載緘謄願得太上至眞道炁靈寳瑞光下降流入臣等身中令臣所啓之誠速逹徑御至眞无極大道三清上聖昊天至尊金闕玉皇上帝御前請稱法位具位與臨壇官衆等謹同誠上啓虚无自然元始天尊无極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝太帝東華南極西靈北眞玄都王京金闕七寳瓊臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師上相上宰上保丄傳太平下教二十四眞人西城惣眞王君太乙眞人東嶽上卿司命茅君定録保命二眞人名山洞府得道神仙三界官屬一切眞靈臣聞四象吁貟隱太虚於元洞九陽煥散泛妙炁於梵華碧靄森羅玄精杳邈通明三景滋育萬生肇龍漢之開圖發始青之變化天寳出書而傳世秀結神章玉清應號以度人光浮靈篆真機敷露正道流行臣等謬合玄圖獲叅上範憑瓊顔而妙感回侍晨軒想珠口以凝神奉宣法事凡有所啓敢不以聞齋意青詞謹當宣奏宣詞具如詞言不違懇欵恩惟太上分别哀祈臣聞無形無影神風靜黙而洞煥太空若存若亡四炁朗清而緬平一等群妖束首萬聖臨軒臣等辨色精思凌晨對越清風發旦瞻靈曜之方昇黄道啓明正羣隂之盡伏寳炁空浮於玄座祥烟髙靄於大羅恭假香傳奉修齋直以今第二日清旦行道請法衆等運兹初捻上香願此香烟騰空徑上供養虚无至眞自然大道元始天尊願以是捻香功德上祝當今皇帝景命無疆伏願曆過萬年德光四表赤烏流屋紹開火運之隆神馬出河𠃔格天書之瑞誕恊靈而握梵永膺籙以受圖帝祚昌隆皇天眷佑嘉祥交應景貺咸臻今故燒香自皈依道尊大聖衆至眞之德得道之後祈天長存臣聞至道垂科鳯篆降清微之境元皇敷教龍章浮碧落之空普濟幽明同霑福佑以今第二日清旦行道請法衆等運兹二捻上香願此香烟騰空徑上供養玉晨至聖自然靈寳大道天尊願以是捻香功德上資所薦神靈伏願宴景玉京進階寳𠕋面虚皇而受道陞瑶陛以登眞永處逍遥長居極樂注銀河之仙𣲖擷瓊圃之天芳潤浹九圍香傅萬葉今故燒香自皈依經尊大聖衆至眞之德得道之後昇入無形臣聞常應常靜靈光洞燭而萬行皆施圓寂圓通惠醴遍沾而九泉均濟道慈廣大至德涵容以今第二日清旦行道請法衆等運兹三捻上香願此香烟騰空徑上供養混元大聖自然化主道德天尊願以是捻香功德上資所薦神靈伏願髙抗大羅冥通无色飄飄素質練真於流火之庭鬱鬱玉葩秀實於琅霄之舘應靈圖而乗運合空洞以生神上聖回光神公攝景超證真常齊年天地今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形懴悔三啓三禮重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天眞十方師尊聖衆三界官屬一切威靈臣聞十遍周回召至眞於碧落九幽開泰度神識以昇仙臣等叨濯玄津竊乗良㑹所冝離形黜智悟我理之兼忘守靜致虚錬形神而髙舉蚤奉中盟而佩籙誓弘大法以度人粗積微功少禆玄化况承詞剡恭爲典行伏慮臣等戒踈德薄學淺才微冒犯條章惟希寛宥伏願分别哀祈洞垂省覽頒布青宫之符命開度所薦之神儀徑入太清登眞成道則上明天尊大慈之化下副臣等皈命之誠謹啓以聞一願靈光下燭二願道月揚輝三願恩宣九地四願誠逹九天五願眞靈俱㑹六願道炁周圍七願天堂開敞八願地獄隳摧九願玄功普被十願駕景空飛十一願普天懷德十二願道合無爲復爐存神燒香香官使者左右龍虎君侍香諸靈官當令臣向來早朝陛壇行道之所自然生金液丹碧芝英百靈衆眞交㑹在此香火爐前當願十方仙童玉女接侍蘭煙傳臣向來所奏之誠速逹徑上至眞无極大道三清上聖昊天至尊金闕玉皇上帝御前玉籙大齋第二日早朝儀
